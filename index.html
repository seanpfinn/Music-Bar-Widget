<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Box — Demo</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="miniplayer.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #09090b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .demo-copy {
      max-width: 32rem;
      text-align: center;
    }
    .demo-copy h1 {
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
    }
    .demo-copy p {
      color: #52525b;
      line-height: 1.5;
      margin: 0 0 0.5rem;
    }
    .demo-toggle {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid #e4e4e7;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.875rem;
    }
    /* Minimal dark-mode demo so you can see the .dark variant in miniplayer.css.
       Your project's own theme system replaces this. */
    html.dark { background: #09090b; }
    html.dark body { background: #09090b; color: #fafafa; }
    html.dark .demo-copy p { color: #a1a1aa; }
    html.dark .demo-toggle { background: #09090b; color: #fafafa; border-color: #27272a; }
  </style>
</head>
<body>

  <div class="demo-copy">
    <h1>Music Box</h1>
    <p>A persistent, site-wide mini player. It's already playing (muted — tap anywhere to unmute), pinned to the bottom of this page.</p>
    <p>On mobile, wait 10 seconds and it'll slide most of the way off-screen — swipe it back in.</p>
    <button class="demo-toggle" id="demo-dark-toggle" type="button">Toggle dark mode</button>
  </div>

  <script src="miniplayer.js"></script>
  <script>
    document.getElementById('demo-dark-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });
  </script>
</body>
</html>
